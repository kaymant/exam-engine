<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon/favicon.ico">
    <title>Exam Environment</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- KaTeX for synchronous math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="exam-header">
        <h2 id="exam-title">Loading Exam...</h2>
        <div id="timer">--:--</div>
    </div>

    <main class="exam-container" id="exam-container">
        <!-- JS will inject questions here -->
    </main>

    <div class="exam-footer">
        <button class="btn-take" id="submit-exam-btn" style="display:none;" onclick="submitExam()">Submit Exam</button>
    </div>

    <script src="js/engine.js"></script>
  
  <footer class="site-footer">
        <p>
            <img src="images/logo.png" alt="Anant Kumar Classes" class="footer-logo">
            &copy; <span id="copyright-year"></span> Anant Kumar Classes. All rights reserved.
        </p>
    </footer>

    <script>
        // Auto-update the copyright year
        document.getElementById('copyright-year').innerText = new Date().getFullYear();
    </script>
</body>
</html>
