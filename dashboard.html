<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon/favicon.ico">
    <title>Exam Portal - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js" charset="utf-8"></script>
</head>
<body>
<div id="toast-container"></div>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h2 id="welcome-text">Loading...</h2>
                <p id="tier-text" style="color: var(--text-muted); font-size: 0.9rem;"></p>
            </div>
            <button class="btn-small" onclick="logout()">Logout</button>
        </header>

        <main>
            <!-- Analytics Panel -->
            <section class="panel">
                <h3>Performance Analytics</h3>
                <div id="analytics-grid" class="analytics-grid">
                <p style="color: var(--text-muted);">Loading your performance data...</p>
            </div>

            <div id="analytics-chart" style="width: 100%; margin-top: 2rem;"></div>
            </section>

            <!-- Live Exams Panel -->
            <section class="panel">
                <h3>Available Exams</h3>
                <ul id="live-exams-list" class="exam-list">
                    <li>Loading available exams...</li>
                </ul>
            </section>

            <!-- Past Submissions Panel -->
            <section class="panel">
                <h3>Past Submissions</h3>
                <ul id="past-exams-list" class="exam-list">
                    <li>Loading history...</li>
                </ul>
            </section>
        </main>
    </div>

    <script src="js/dashboard.js"></script>
    
  <footer class="site-footer">
        <p>
            <img src="images/logo.png" alt="Anant Kumar Classes" class="footer-logo">
            &copy; <span id="copyright-year"></span> Anant Kumar Classes. All rights reserved.
        </p>
    </footer>

    <script>
        // Auto-update the copyright year
        document.getElementById('copyright-year').innerText = new Date().getFullYear();
    </script>
</body>
</html>
